name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0)'
        required: true

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build Release
        run: |
          xcodebuild build \
            -project PlaySpot.xcodeproj \
            -scheme PlaySpot \
            -configuration Release \
            -derivedDataPath build \
            -destination 'platform=macOS'

      - name: Package app
        run: |
          cd build/Build/Products/Release
          zip -r PlaySpot.zip PlaySpot.app

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ inputs.version }} \
            build/Build/Products/Release/PlaySpot.zip \
            --title "PlaySpot ${{ inputs.version }}" \
            --generate-notes
